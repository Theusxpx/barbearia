<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=1600");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
font-size:28px;
font-weight:600;
letter-spacing:3px;
border-bottom:3px solid #c9a227;
}

.hero{
text-align:center;
padding:60px 20px;
background:rgba(0,0,0,0.6);
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
}

.container{
max-width:600px;
margin:40px auto;
background:rgba(0,0,0,0.85);
padding:35px;
border-radius:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
color:#ccc;
}

input, select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
font-size:15px;
}

.services{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.services label{
background:#2a2a2a;
padding:10px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

/* ===== IMAGENS NOS QUADRADOS (ADICIONADO) ===== */
.services label{
position:relative;
overflow:hidden;
color:white;
}

.services label::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
z-index:0;
}

.services label input,
.services label{
position:relative;
z-index:1;
}

.services label:nth-child(1){
background:url("https://images.unsplash.com/photo-1517832606299-7ae9b720a186?w=600") center/cover;
}

.services label:nth-child(2){
background:url("https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600") center/cover;
}

.services label:nth-child(3){
background:url("https://images.unsplash.com/photo-1599351431202-1e0f0137899a?w=600") center/cover;
}

.services label:nth-child(4){
background:url("https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600") center/cover;
}

.services label:nth-child(5){
background:url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=600") center/cover;
}

.services label:nth-child(6){
background:url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=600") center/cover;
}
/* ===== FIM ===== */

.services label:hover{
background:#c9a227;
color:black;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:6px;
background:#c9a227;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a8841f;
transform:scale(1.03);
box-shadow:0 0 15px rgba(201,162,39,0.6);
}

.galeria{
max-width:1000px;
margin:auto;
padding:40px 20px;
background:#111;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.galeria h2{
text-align:center;
margin-bottom:30px;
}

.fotos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.fotos img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}

.fotos img:hover{
transform:scale(1.08);
filter:brightness(1.2);
}

.final{
height:300px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:28px;
font-weight:600;
color:white;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1622288432450-277d0fef5ed6?w=1200");
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.admin{
max-width:800px;
margin:40px auto;
background:#000;
padding:30px;
border-radius:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.item{
background:#1a1a1a;
padding:15px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.item button{
width:auto;
padding:8px 12px;
font-size:14px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
background:black;
}

.insta{
display:block;
text-align:center;
margin-top:10px;
color:#c9a227;
text-decoration:none;
}

#popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#c9a227;
color:black;
padding:15px 25px;
border-radius:8px;
font-weight:600;
z-index:999;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>
💈 Barbearia Premium
</header>

<section class="hero">
<h1>Agende seu horário</h1>
<p>Corte, barba e cuidados profissionais</p>
</section>

<div class="container">

<h2>Agendamento</h2>

<label for="nome">Nome</label>
<input type="text" id="nome" placeholder="Digite seu nome completo">

<label for="barbeiro">Escolher Barbeiro</label>
<select id="barbeiro">
<option>Ramon</option>
<option>João</option>
</select>

<label for="data">Data</label>
<input type="date" id="data">

<label for="hora">Horário</label>
<select id="hora"></select>

<label>Serviços</label>
<div class="services">
<label><input type="checkbox" value="Corte + barba + sobrancelha">Corte + barba + sobrancelha</label>
<label><input type="checkbox" value="Corte + barba + progressiva">Corte + barba + progressiva</label>
<label><input type="checkbox" value="Corte + Barba">Corte + Barba</label>
<label><input type="checkbox" value="Hidratação">Hidratação</label>
<label><input type="checkbox" value="Corte + pigmentação">Corte + pigmentação</label>
<label><input type="checkbox" value="Sobrancelha"> Sobrancelha</label>
</div>

<button id="btn-agendar" type="button" onclick="agendar()">Agendar pelo WhatsApp</button>

</div>

<section class="galeria">
<h2>Trabalhos da Barbearia</h2>
<div class="fotos">
<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600">
<img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?w=600">
<img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600">
<img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600">
</div>
</section>

<section class="final">
<h2>Seu estilo começa aqui 💈</h2>
</section>

<section class="admin">
<h2>Painel de Agendamentos</h2>
<div id="lista"></div>
</section>

<a href="https://instagram.com" target="_blank" class="insta">📸 Instagram</a>

<footer>
Barbearia Premium © 2026
</footer>

<script>
function gerarHorarios(){
    const select = document.getElementById("hora");
    select.innerHTML = "";

    for(let h = 9; h <= 19; h++){
        for(let m = 0; m < 60; m += 30){
            let hora = h.toString().padStart(2,'0') + ":" + m.toString().padStart(2,'0');
            let option = document.createElement("option");
            option.value = hora;
            option.textContent = hora;
            select.appendChild(option);
        }
    }
}

window.onload = gerarHorarios;
</script>

</body>
</html>
