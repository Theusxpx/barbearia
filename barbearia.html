<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=1600");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
font-size:28px;
font-weight:600;
letter-spacing:3px;
border-bottom:3px solid #c9a227;
}

.hero{
text-align:center;
padding:60px 20px;
background:rgba(0,0,0,0.6);
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
}

.container{
max-width:600px;
margin:40px auto;
background:rgba(0,0,0,0.85);
padding:35px;
border-radius:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
color:#ccc;
}

input, select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
font-size:15px;
}

.services{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.services label{
background:#2a2a2a;
padding:10px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.services label:hover{
background:#c9a227;
color:black;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:6px;
background:#c9a227;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#a8841f;
transform:scale(1.03);
box-shadow:0 0 15px rgba(201,162,39,0.6);
}

.galeria{
max-width:1000px;
margin:auto;
padding:40px 20px;
background:#111;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.galeria h2{
text-align:center;
margin-bottom:30px;
}

.fotos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.fotos img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}

.fotos img:hover{
transform:scale(1.08);
filter:brightness(1.2);
}

.final{
height:300px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:28px;
font-weight:600;
color:white;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1622288432450-277d0fef5ed6?w=1200");
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.admin{
max-width:800px;
margin:40px auto;
background:#000;
padding:30px;
border-radius:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s ease forwards;
}

.item{
background:#1a1a1a;
padding:15px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.item button{
width:auto;
padding:8px 12px;
font-size:14px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
background:black;
}

.insta{
display:block;
text-align:center;
margin-top:10px;
color:#c9a227;
text-decoration:none;
}

#popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#c9a227;
color:black;
padding:15px 25px;
border-radius:8px;
font-weight:600;
z-index:999;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>
💈 Barbearia Premium
</header>

<section class="hero">
<h1>Agende seu horário</h1>
<p>Corte, barba e cuidados profissionais</p>
</section>

<div class="container">

<h2>Agendamento</h2>

<label>Nome</label>
<input type="text" id="nome">

<label>Escolher Barbeiro</label>
<select id="barbeiro">
<option>Moises</option>
<option>Reinaldo</option>
<option>Wallace</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Horário</label>
<select id="hora"></select>

<label>Serviços</label>
<div class="services">
<label><input type="checkbox" value="Corte"> Corte</label>
<label><input type="checkbox" value="Barba"> Barba</label>
<label><input type="checkbox" value="Corte + Barba"> Corte + Barba</label>
<label><input type="checkbox" value="Hidratação"> Hidratação</label>
<label><input type="checkbox" value="Pigmentação"> Pigmentação</label>
<label><input type="checkbox" value="Sobrancelha"> Sobrancelha</label>
</div>

<button onclick="agendar()">Agendar pelo WhatsApp</button>

</div>

<section class="galeria">
<h2>Trabalhos da Barbearia</h2>
<div class="fotos">
<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600">
<img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?w=600">
<img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=600">
<img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600">
</div>
</section>

<section class="final">
<h2>Seu estilo começa aqui 💈</h2>
</section>

<section class="admin">
<h2>Painel de Agendamentos</h2>
<div id="lista"></div>
</section>

<a href="https://instagram.com" target="_blank" class="insta">📸 Instagram</a>

<footer>
Barbearia Premium © 2026
</footer>

<script>
// CONFIG
const inicio = 9
const fim = 19
const intervalo = 30
const chave = "agenda_barbearia"

// PEGAR AGENDA
function pegarAgenda() {
    return JSON.parse(localStorage.getItem(chave)) || []
}

// SALVAR
function salvarAgenda(dados) {
    let agenda = pegarAgenda()
    agenda.push(dados)
    localStorage.setItem(chave, JSON.stringify(agenda))
}

// GERAR HORÁRIOS
function gerarHorarios() {
    let select = document.getElementById("hora")
    select.innerHTML = ""
    let data = document.getElementById("data").value
    let barbeiro = document.getElementById("barbeiro").value
    let agenda = pegarAgenda()

    for (let h = inicio; h < fim; h++) {
        for (let m = 0; m < 60; m += intervalo) {
            let hora = String(h).padStart(2, "0")
            let minuto = String(m).padStart(2, "0")
            let horario = `${hora}:${minuto}`
            let option = document.createElement("option")
            option.value = horario
            option.textContent = horario

            let ocupado = agenda.find(a => a.data === data && a.hora === horario && a.barbeiro === barbeiro)
            if (ocupado) {
                option.disabled = true
                option.textContent += " (ocupado)"
            }

            if (data) {
                let agora = new Date()
                let dataHora = new Date(`${data}T${horario}`)
                if (dataHora < agora) option.disabled = true
            }

            select.appendChild(option)
        }
    }
}

// ATUALIZA
document.getElementById("data").addEventListener("change", gerarHorarios)
document.getElementById("barbeiro").addEventListener("change", gerarHorarios)

// RENDERIZA AGENDA ADMIN
function renderizarAgenda(){
    let lista = document.getElementById("lista")
    lista.innerHTML = ""
    let agenda = pegarAgenda()
    agenda.forEach((a,index)=>{
        let div = document.createElement("div")
        div.className = "item"
        div.innerHTML = `${a.nome} - ${a.barbeiro} <br> ${a.data} às ${a.hora} <br> ${a.servicos.join(", ")}`
        let btn = document.createElement("button")
        btn.textContent = "Cancelar"
        btn.onclick = ()=>{
            agenda.splice(index,1)
            localStorage.setItem(chave, JSON.stringify(agenda))
            renderizarAgenda()
            gerarHorarios()
        }
        div.appendChild(btn)
        lista.appendChild(div)
    })
}

// AGENDAR
function agendar() {
    let botao = document.querySelector("button")
    botao.disabled = true

    let nome = document.getElementById("nome").value
    let barbeiro = document.getElementById("barbeiro").value
    let data = document.getElementById("data").value
    let hora = document.getElementById("hora").value

    let servicos = []
    document.querySelectorAll("input[type=checkbox]:checked").forEach(el => servicos.push(el.value))

    if (!nome || !data || !hora) {
        alert("Preencha todos os campos!")
        botao.disabled = false
        return
    }

    let agenda = pegarAgenda()
    let conflito = agenda.some(a => a.data===data && a.hora===hora && a.barbeiro===barbeiro)
    if (conflito){
        alert("❌ Esse horário já foi reservado!")
        gerarHorarios()
        botao.disabled = false
        return
    }

    let novoAgendamento = { nome, barbeiro, data, hora, servicos }
    salvarAgenda(novoAgendamento)
    renderizarAgenda()

    let mensagem = `💈 *Agendamento Barbearia Premium* 💈\n\n👤 Nome: ${nome}\n✂️ Barbeiro: ${barbeiro}\n📅 Data: ${data}\n⏰ Horário: ${hora}\n🧔 Serviços: ${servicos.join(", ")}\n\nObrigado!`
    let numero = "5561982075238"
    let link = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`
    window.open(link)

    document.body.insertAdjacentHTML("beforeend", `<div id="popup">✅ Agendamento confirmado!</div>`)
    setTimeout(()=>{document.getElementById("popup").remove()},2000)

    gerarHorarios()
    botao.disabled = false
}

// INICIAR
gerarHorarios()
renderizarAgenda()
</script>

</body>
</html>
